name: CI

run-name: CI / ${{ github.event_name }} / ${{ github.ref_name }}

on:
    push:
        branches: [main]
        paths-ignore:
            - "docs/**"
            - "**.md"
            - "LICENSE"
            - ".gitignore"
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

env:
    GOFLAGS: -buildvcs=false

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Run tests
              run: make race

    lint:
        name: Lint
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                  version: v2.12.2
                  args: --timeout=5m --config=.golangci.yml

    security:
        name: Security
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Install gosec
              run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

            - name: Run security checks
              run: make sec

    compile:
        name: Compile check
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Compile check
              run: make compile
