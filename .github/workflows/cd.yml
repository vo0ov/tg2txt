name: CD

run-name: CD / ${{ github.event_name }} / ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

on:
    push:
        tags: ["v*"]

    workflow_dispatch:
        inputs:
            tag:
                description: "Existing release tag, for example v1.2.3"
                required: true
                type: string

permissions:
    contents: read

concurrency:
    group: cd-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
    cancel-in-progress: true

env:
    GOFLAGS: -buildvcs=false

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
                  cache: true

            - name: Build release artifacts
              run: make release VERSION=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
                  name: Release ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
                  files: dist/*
